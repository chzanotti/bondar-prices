name: Actualizar precios IOL

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:          # boton "Run workflow" manual

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Commitear prices.json si cambio
        run: |
          git config user.name "bondar-bot"
          git config user.email "bondar-bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Actualizar precios IOL [bot]"
          git push
